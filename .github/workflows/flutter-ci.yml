name: Flutter CI (future)
on:
  push:
    branches: [future]
  workflow_dispatch:
jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      # GitHub Secretsから必要なファイルを作成
      - name: Create google-services.json (prod)
        run: |
          mkdir -p android/app/src/prod
          cat << 'EOF' > android/app/src/prod/google-services.json
          ${{ secrets.GOOGLE_SERVICES_JSON_PROD }}
          EOF

      - name: Decode keystore
        run: echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > android/app/upload-keystore.jks

      - name: Create key.properties
        run: |
          cat << 'EOF' > android/key.properties
          storePassword=${{ secrets.KEYSTORE_STORE_PASSWORD }}
          keyPassword=${{ secrets.KEYSTORE_KEY_PASSWORD }}
          keyAlias=${{ secrets.KEYSTORE_KEY_ALIAS }}
          storeFile=upload-keystore.jks
          EOF

      - name: Create firebase_options.dart
        run: |
          cat << 'EOF' > lib/firebase_options.dart
          ${{ secrets.FIREBASE_OPTIONS_DART }}
          EOF

      - name: Create .env file
        run: |
          cat << 'EOF' > .env
          ${{ secrets.DOT_ENV }}
          EOF

      - name: Get dependencies
        run: flutter pub get

      # モックファイル生成（認証テスト用）
      - name: Generate mocks
        run: flutter pub run build_runner build --delete-conflicting-outputs

      # 🧪 Unit Tests実行（CRUD + 認証）
      - name: Run Unit Tests
        run: flutter test test/datastore/ test/auth/ --reporter github
        continue-on-error: false

      # テスト結果サマリー表示
      - name: Test Summary
        if: always()
        run: |
          echo "✅ future ブランチ向け単体テスト完了"
