name: Flutter CI/CD
on:
  push:
    branches: [main]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: "stable"

      # GitHub Secretsから必要なファイルを作成
      - name: Create google-services.json
        run: |
          cat << 'EOF' > android/app/google-services.json
          ${{ secrets.GOOGLE_SERVICES_JSON }}
          EOF

      - name: Create firebase_options.dart
        run: |
          cat << 'EOF' > lib/firebase_options.dart
          ${{ secrets.FIREBASE_OPTIONS_DART }}
          EOF

      - name: Create .env file
        run: |
          cat << 'EOF' > .env
          ${{ secrets.DOT_ENV }}
          EOF

      - name: Get dependencies
        run: flutter pub get

      # モックファイル生成（認証テスト用）
      - name: Generate mocks
        run: flutter pub run build_runner build --delete-conflicting-outputs

      # 🧪 Unit Tests実行（CRUD + 認証）
      - name: Run Unit Tests
        run: flutter test test/datastore/ test/auth/ --reporter github
        continue-on-error: false

      # テスト結果サマリー表示
      - name: Test Summary
        if: always()
        run: |
          echo "✅ CRUD Tests: 29 tests"
          echo "✅ Auth Tests: 47 tests"
          echo "✅ Total: 76 tests"

      - name: Build Android APK (dev flavor)
        run: flutter build apk --release --flavor dev

      # APKをアーティファクトとしてアップロード
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk-dev
          path: build/app/outputs/flutter-apk/app-dev-release.apk
