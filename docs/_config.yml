title: GoShopping
description: 家族の買い物リストを共有するアプリ
lang: ja

# Markdownファイルをそのまま処理
markdown: kramdown

# Liquid エラーを警告扱いにして ${{ }} などで build が止まらないようにする
liquid:
  error_mode: lax

# ${{ }} などの GitHub Actions 式が Liquid テンプレートとして解釈されないよう無効化
defaults:
  - scope:
      path: ""
    values:
      render_with_liquid: false
